<title>MIM Chatbot · Hochschule Pforzheim</title>

<style>
  :root {

    --accent-hover: #9c7008;
    --accent-soft: #fdf8e4;
    --accent-line: #e8d99c;
    --user-bg: #1a1a1a;
    --user-fg: #ffffff;
    --ok: #2e7d32;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; line-height: 1.55; }

  ::selection { background: var(--accent); color: white; }

  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
  .logo .mark { width: 38px; height: 38px; background: var(--accent); color: white; display: grid; place-items: center; font-weight: 700; font-size: 14px; letter-spacing: -0.02em; }
  .logo .wm { display: flex; flex-direction: column; line-height: 1.1; }
  .logo .wm .top { font-weight: 700; font-size: 16px; color: var(--text); }
  .logo .wm .bot { font-weight: 400; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .audio-toggle { display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid var(--border-strong); color: var(--text); padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .audio-toggle:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-hover); }
  .audio-toggle .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .audio-toggle.off .dot { background: var(--muted); }

  .page-head { padding: 32px 0 18px; }
  .page-head h1 { margin: 0 0 8px; font-size: 28px; font-weight: 700; letter-spacing: -0.01em; }
  .page-head p { margin: 0; color: var(--text-soft); font-size: 15px; }

  .panel { border: 1px solid var(--border); background: white; display: flex; flex-direction: column; margin-bottom: 32px; }
  .chat-area { padding: 20px; min-height: 320px; max-height: 540px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border-strong); }
  .empty { text-align: center; padding: 40px 16px; color: var(--muted); }
  .empty .big { font-size: 17px; color: var(--text-soft); margin-bottom: 4px; font-weight: 600; }
  .empty .small { font-size: 14px; }

  .msg { max-width: 84%; padding: 12px 16px; line-height: 1.55; white-space: pre-wrap; word-wrap: break-word; font-size: 15px; animation: appear 0.2s ease-out; }
  @keyframes appear { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; background: var(--user-bg); color: var(--user-fg); border-radius: 12px 12px 4px 12px; font-weight: 500; }

  .msg.bot .who { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 8px; display: flex; gap: 10px; align-items: center; }

/* ============================================================
 * Keyword-Matching
 * ===========================================================*/
function findAnswer(query) {
  const q = query.toLowerCase().replace(/[.,!?;:]/g, " ");
  const tokens = q.split(/\s+/).filter(Boolean);
  let best = null, bestScore = 0;
  for (const item of QA) {
    let score = 0;
    for (const kw of item.keywords) {
      if (q.includes(kw)) score += kw.split(" ").length * 2;
      for (const t of tokens) if (t === kw) score += 1;
    }
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return bestScore >= 2 ? best : null;
}
function findByChip(chipId) {
  for (const item of QA) if (item.chip === chipId) return item;
  return null;
}

/* ============================================================
 * Audio playback — versucht MP3, sonst Browser-TTS
 * ===========================================================*/
let audioOn = (localStorage.getItem("mim_audio_on") || "1") === "1";
const audioToggle = document.getElementById("audioToggle");
const audioLabel = document.getElementById("audioLabel");
function updateAudioToggle() {
  audioToggle.classList.toggle("off", !audioOn);
  audioLabel.textContent = audioOn ? "Stimme an" : "Stimme aus";
}
updateAudioToggle();
audioToggle.addEventListener("click", () => { audioOn = !audioOn; localStorage.setItem("mim_audio_on", audioOn ? "1" : "0"); updateAudioToggle(); if (!audioOn) stopAudio(); });

let currentAudio = null, currentUtterance = null;
function stopAudio() {
  if (currentAudio) { try { currentAudio.pause(); currentAudio.currentTime = 0; } catch (e) {} currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  currentUtterance = null;
  document.querySelectorAll(".msg.bot.playing").forEach(el => el.classList.remove("playing"));
}
document.getElementById("stopAudio").addEventListener("click", stopAudio);

async function play(text, audioPath, msgEl) {
  if (!audioOn) return;
  stopAudio();
  if (msgEl) msgEl.classList.add("playing");
  if (audioPath) {
    const a = new Audio(audioPath);
    currentAudio = a;
    a.addEventListener("ended", () => { if (msgEl) msgEl.classList.remove("playing"); if (currentAudio === a) currentAudio = null; });
    a.addEventListener("error", () => {
      if (msgEl) msgEl.classList.remove("playing");
      currentAudio = null;
      ttsFallback(text, msgEl);
    });
    try { await a.play(); } catch (e) { ttsFallback(text, msgEl); }
  } else {
    ttsFallback(text, msgEl);
  }
}
function ttsFallback(text, msgEl) {
  if (!window.speechSynthesis) { if (msgEl) msgEl.classList.remove("playing"); return; }
  if (msgEl) msgEl.classList.add("playing");
  const voices = window.speechSynthesis.getVoices();
  const malePref = ["markus", "stefan", "yannick", "conrad"];
  const v = voices.find(v => v.lang.startsWith("de") && malePref.some(m => v.name.toLowerCase().includes(m)))
         || voices.find(v => v.lang.startsWith("de")) || null;
  const u = new SpeechSynthesisUtterance(text);
  if (v) { u.voice = v; u.lang = v.lang; } else u.lang = "de-DE";
  u.rate = 0.95; u.pitch = 0.95;
  if (msgEl) {
    u.onend = () => { msgEl.classList.remove("playing"); if (currentUtterance === u) currentUtterance = null; };
    u.onerror = () => msgEl.classList.remove("playing");
  }
  currentUtterance = u;
  window.speechSynthesis.speak(u);
}

/* ============================================================
 * UI / History
 * ===========================================================*/
const HIST_KEY = "mim_offline_hist_v1";
const $ = id => document.getElementById(id);
const chatEl = $("chat"), inputEl = $("input"), formEl = $("form");
let history = (() => { try { return JSON.parse(localStorage.getItem(HIST_KEY) || "[]"); } catch (e) { return []; } })();
function saveHistory() { localStorage.setItem(HIST_KEY, JSON.stringify(history)); }

function renderAll() {
  chatEl.innerHTML = "";
  if (history.length === 0) {
    const e = document.createElement("div"); e.className = "empty";
    e.innerHTML = '<div class="big">Womit kann ich helfen?</div><div class="small">Wählen Sie eine der Vorschlagsfragen oder fragen Sie selbst.</div>';
    chatEl.appendChild(e);
    return;
  }
  for (const m of history) m.role === "bot" ? addBot(m.text, m.audio, m.source, false) : addUser(m.text, false);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function clearEmpty() { const e = chatEl.querySelector(".empty"); if (e) e.remove(); }
function addUser(text, persist = true) {
  clearEmpty();
  const d = document.createElement("div"); d.className = "msg user"; d.textContent = text;
  chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
  if (persist) { history.push({ role: "user", text }); saveHistory(); }
}
function addBot(text, audio, source, persist = true) {
  clearEmpty();
  const d = document.createElement("div"); d.className = "msg bot";
  const who = document.createElement("div"); who.className = "who";
  const lbl = document.createElement("span"); lbl.textContent = "Prof. Volz"; who.appendChild(lbl);
  if (source) {
    const s = document.createElement("span"); s.className = "source" + (source === "fallback" ? " fb" : "");
    s.textContent = source === "match" ? "Aus Wissensbasis" : "Außerhalb Wissensbasis";
    who.appendChild(s);
  }
  const play = document.createElement("button"); play.className = "play"; play.textContent = "Vorlesen";
  play.addEventListener("click", () => play_(text, audio, d));
  who.appendChild(play);
  d.appendChild(who);
  const b = document.createElement("div"); b.textContent = text; d.appendChild(b);
  chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
  if (persist) { history.push({ role: "bot", text, audio, source }); saveHistory(); }
  return { wrap: d, body: b };
}
function play_(text, audio, msgEl) { play(text, audio, msgEl); }

function ask(query) {
  addUser(query);
  inputEl.value = ""; autosize();
  const match = findAnswer(query);
  const item = match || FALLBACK;
  const source = match ? "match" : "fallback";
  const bot = addBot(item.answer, item.audio, source);
  if (audioOn) play(item.answer, item.audio, bot.wrap);
}
function askByChip(chipId) {
  const item = findByChip(chipId);
  if (!item) return;
  addUser(chipLabel(chipId));
  const bot = addBot(item.answer, item.audio, "match");
  if (audioOn) play(item.answer, item.audio, bot.wrap);
}
function chipLabel(id) {
  for (const b of document.querySelectorAll(".chip")) if (b.dataset.q === id) return b.textContent;
  return id;
}

formEl.addEventListener("submit", (e) => { e.preventDefault(); const q = inputEl.value.trim(); if (q) ask(q); });
inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); formEl.requestSubmit(); } });
inputEl.addEventListener("input", autosize);
function autosize() { inputEl.style.height = "auto"; inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px"; }
$("suggestions").addEventListener("click", (e) => { const b = e.target.closest(".chip"); if (!b) return; askByChip(b.dataset.q); });
$("resetChat").addEventListener("click", () => { if (confirm("Konversation wirklich zurücksetzen?")) { history = []; saveHistory(); renderAll(); } });

renderAll();
</script>
</body>
</html>
